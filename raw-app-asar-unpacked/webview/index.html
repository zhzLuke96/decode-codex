      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--startup-background);
      }

      body {
        outline: none;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .startup-loader {
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        background: var(--startup-background);
        -webkit-app-region: drag;
      }

      .startup-loader__logo {
        position: relative;
        width: 56px;
        height: 56px;
        opacity: 0;
        animation: startup-openai-blossom-fade-in 180ms ease-out 60ms forwards;
      }

      .startup-loader__base,
      .startup-loader__overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .startup-loader__base {
        color: var(--startup-logo-shimmer-base);
      }

      .startup-loader__overlay {
        background-image: linear-gradient(
          112deg,
          transparent 22%,
          var(--startup-logo-shimmer-soft) 38%,
          var(--startup-logo-shimmer-peak) 49%,
          var(--startup-logo-shimmer-tail) 56%,
          transparent 74%
        );
        background-position: 140% 0;
        background-repeat: no-repeat;
        background-size: 220% 100%;
        animation: startup-openai-blossom-shimmer 2200ms
          cubic-bezier(0.4, 0, 0.2, 1) infinite;
        -webkit-mask-image: var(--startup-logo-mask);
        mask-image: var(--startup-logo-mask);
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-size: contain;
        mask-size: contain;
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-loader__logo {
          animation: none;
          opacity: 1;
        }

        .startup-loader__overlay {
          animation: none;
        }
      }

      @keyframes startup-openai-blossom-fade-in {
        0% {
          opacity: 0;
        }

        100% {
          opacity: 1;
        }
      }

      @keyframes startup-openai-blossom-shimmer {
        0% {
          background-position: 140% 0;
        }

        100% {
          background-position: -105% 0;
        }
      }
